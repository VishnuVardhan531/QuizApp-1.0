name: flutter_app
description: A premium real-time Quiz Application for participants and hosts.
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  socket_io_client: ^2.0.3
  http: ^1.1.0
  provider: ^6.0.5
  image_picker: ^1.0.4
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.2.0
  google_fonts: ^6.1.0
  path_provider: ^2.1.1
  shared_preferences: ^2.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
